name: Sync upstream

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Configure Git
        run: |
          git config --global user.name "PG"
          git config --global user.email "paolo.giammarco@gmail.com"
    
      - name: Add upstream
        run: git remote add upstream https://github.com/pesa1234/MT6000_cust_build.git

      - name: Fetch upstream
        run: git fetch upstream

      - name: Merge upstream
        run: |
          git checkout main
          git merge upstream/main  --allow-unrelated-histories -X theirs --no-edit

      - name: Push changes
        run: git push
